<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" width="720" height="640" role="img" aria-label="AIでホームページ制作を内製化するイメージ">
  <defs>
    <linearGradient id="bgPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8C7FF0"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#D4C8FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#EDE7FB" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EDE7FB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF8A33"/>
    </linearGradient>
    <linearGradient id="aiBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D5BE3"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#6D5BE3" flood-opacity="0.18"/>
    </filter>
    <filter id="soft">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Purple gradient background blob -->
  <rect width="720" height="640" fill="url(#bgPurple)" rx="40"/>
  <ellipse cx="360" cy="280" rx="320" ry="220" fill="url(#glow)"/>

  <!-- Floating sparkles -->
  <g opacity="0.9">
    <path d="M120 100 l8 -20 l8 20 l20 8 l-20 8 l-8 20 l-8 -20 l-20 -8 z" fill="#fff" opacity="0.85"/>
    <path d="M620 80 l6 -14 l6 14 l14 6 l-14 6 l-6 14 l-6 -14 l-14 -6 z" fill="#FFE4B8"/>
    <path d="M60 380 l5 -12 l5 12 l12 5 l-12 5 l-5 12 l-5 -12 l-12 -5 z" fill="#fff" opacity="0.7"/>
    <circle cx="680" cy="380" r="4" fill="#fff"/>
    <circle cx="60" cy="520" r="5" fill="#fff" opacity="0.7"/>
    <circle cx="200" cy="40" r="3" fill="#fff"/>
    <circle cx="660" cy="540" r="4" fill="#FFE4B8"/>
  </g>

  <!-- Floating AI badge top-right -->
  <g transform="translate(540, 50)" filter="url(#soft)">
    <circle cx="55" cy="55" r="48" fill="url(#aiBadge)"/>
    <circle cx="55" cy="55" r="48" fill="none" stroke="#fff" stroke-width="2" opacity="0.55"/>
    <text x="55" y="68" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="900" font-size="28" fill="#fff" letter-spacing="0.04em">AI</text>
    <path d="M55 16 l3 -8 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 z" fill="#fff" transform="translate(0, -2)"/>
  </g>

  <!-- Browser window (main card) -->
  <g transform="translate(80, 130)" filter="url(#cardShadow)">
    <rect width="520" height="360" rx="20" fill="#fff"/>
    <!-- Window chrome -->
    <path d="M0 20 Q0 0 20 0 L500 0 Q520 0 520 20 L520 50 L0 50 Z" fill="#FAFBFC"/>
    <line x1="0" y1="50" x2="520" y2="50" stroke="#EDE9F7" stroke-width="1"/>
    <circle cx="22" cy="25" r="6" fill="#FF6B7A"/>
    <circle cx="42" cy="25" r="6" fill="#FFCB6B"/>
    <circle cx="62" cy="25" r="6" fill="#52D17E"/>
    <rect x="100" y="16" width="320" height="18" rx="9" fill="#fff" stroke="#EDE9F7"/>
    <circle cx="113" cy="25" r="3" fill="#52D17E"/>
    <rect x="124" y="21" width="180" height="8" rx="1" fill="#D4CFE8"/>

    <!-- Page content -->
    <rect x="40" y="80" width="100" height="12" rx="2" fill="#6D5BE3"/>
    <rect x="40" y="106" width="380" height="26" rx="3" fill="#1A1A1A"/>
    <rect x="40" y="138" width="260" height="26" rx="3" fill="#1A1A1A"/>

    <!-- Pills -->
    <rect x="40" y="186" width="96" height="30" rx="15" fill="#fff" stroke="#D4CFE8" stroke-width="1.5"/>
    <rect x="146" y="186" width="96" height="30" rx="15" fill="#fff" stroke="#D4CFE8" stroke-width="1.5"/>
    <rect x="252" y="186" width="96" height="30" rx="15" fill="#fff" stroke="#D4CFE8" stroke-width="1.5"/>
    <rect x="58" y="197" width="60" height="8" rx="1" fill="#6D5BE3"/>
    <rect x="164" y="197" width="60" height="8" rx="1" fill="#6D5BE3"/>
    <rect x="270" y="197" width="60" height="8" rx="1" fill="#6D5BE3"/>

    <!-- CTA button -->
    <rect x="40" y="238" width="180" height="44" rx="22" fill="url(#orangeGrad)"/>
    <rect x="78" y="254" width="104" height="12" rx="2" fill="#fff"/>

    <!-- Card row -->
    <rect x="40" y="300" width="140" height="46" rx="8" fill="#F7F4FE" stroke="#EDE9F7"/>
    <rect x="190" y="300" width="140" height="46" rx="8" fill="#F7F4FE" stroke="#EDE9F7"/>
    <rect x="340" y="300" width="140" height="46" rx="8" fill="#F7F4FE" stroke="#EDE9F7"/>
    <rect x="54" y="312" width="42" height="7" rx="1" fill="#6D5BE3"/>
    <rect x="54" y="325" width="86" height="10" rx="1" fill="#1A1A1A"/>
    <rect x="204" y="312" width="42" height="7" rx="1" fill="#6D5BE3"/>
    <rect x="204" y="325" width="86" height="10" rx="1" fill="#1A1A1A"/>
    <rect x="354" y="312" width="42" height="7" rx="1" fill="#6D5BE3"/>
    <rect x="354" y="325" width="86" height="10" rx="1" fill="#1A1A1A"/>
  </g>

  <!-- Phone overlap bottom-right -->
  <g transform="translate(510, 360) rotate(-4 100 130)" filter="url(#cardShadow)">
    <rect width="180" height="260" rx="24" fill="#fff"/>
    <rect x="68" y="12" width="44" height="6" rx="3" fill="#EDE9F7"/>
    <rect x="12" y="30" width="156" height="218" rx="16" fill="#F7F4FE"/>
    <!-- Phone content -->
    <rect x="26" y="46" width="50" height="7" rx="1" fill="#6D5BE3"/>
    <rect x="26" y="62" width="128" height="12" rx="2" fill="#1A1A1A"/>
    <rect x="26" y="80" width="96" height="12" rx="2" fill="#1A1A1A"/>
    <rect x="26" y="106" width="62" height="20" rx="10" fill="#fff" stroke="#D4CFE8"/>
    <rect x="94" y="106" width="62" height="20" rx="10" fill="#fff" stroke="#D4CFE8"/>
    <rect x="26" y="138" width="128" height="32" rx="16" fill="url(#orangeGrad)"/>
    <rect x="58" y="148" width="64" height="12" rx="2" fill="#fff"/>
    <rect x="26" y="184" width="128" height="50" rx="6" fill="#fff" stroke="#EDE9F7"/>
    <rect x="36" y="194" width="40" height="6" rx="1" fill="#6D5BE3"/>
    <rect x="36" y="206" width="90" height="9" rx="1" fill="#1A1A1A"/>
    <rect x="36" y="220" width="64" height="6" rx="1" fill="#A8B0BC"/>
  </g>

  <!-- Floating code card bottom-left -->
  <g transform="translate(40, 480)" filter="url(#soft)">
    <rect width="160" height="92" rx="12" fill="#1F1A38"/>
    <circle cx="14" cy="14" r="3" fill="#FF6B7A"/>
    <circle cx="24" cy="14" r="3" fill="#FFCB6B"/>
    <circle cx="34" cy="14" r="3" fill="#52D17E"/>
    <rect x="14" y="30" width="44" height="6" rx="1" fill="#A78BFA"/>
    <rect x="14" y="42" width="84" height="6" rx="1" fill="#fff" opacity="0.7"/>
    <rect x="14" y="54" width="58" height="6" rx="1" fill="#FF8A33"/>
    <rect x="14" y="66" width="104" height="6" rx="1" fill="#fff" opacity="0.5"/>
    <rect x="14" y="78" width="50" height="6" rx="1" fill="#A78BFA"/>
  </g>

  <!-- Small floating stat card top-left -->
  <g transform="translate(30, 60)" filter="url(#soft)">
    <rect width="150" height="62" rx="14" fill="#fff"/>
    <rect x="14" y="14" width="42" height="42" rx="10" fill="#F0EAFE"/>
    <path d="M28 35 l8 8 l16 -16" stroke="#6D5BE3" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="66" y="18" width="64" height="8" rx="1" fill="#1A1A1A"/>
    <rect x="66" y="32" width="50" height="6" rx="1" fill="#9FA8B7"/>
    <rect x="66" y="44" width="70" height="6" rx="1" fill="#9FA8B7"/>
  </g>
</svg>
